<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokkhi</title>
    <!-- Add elegant inline SVG emoji favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐦</text></svg>">
    <!-- Import local CSS style sheet -->
    <link rel="stylesheet" href="./src/style.css" />
    <!-- Load Tailwind CSS CDN for zero-build native browser compilation -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"],
              display: ["Space Grotesk", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            }
          }
        }
      }
    </script>
    <!-- Load Lucide icons from CDN for clean vanilla SVG handling -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-[#0d0d0d] text-white antialiased selection:bg-emerald-800 selection:text-white">
    <div class="min-h-screen bg-[#0d0d0d] text-white font-sans flex flex-col justify-between">
      
      <!-- Top Accent Strip -->
      <div class="h-[2px] bg-emerald-600 w-full"></div>

      <!-- Header section with minimal title "Pokkhi" -->
      <header class="max-w-7xl mx-auto px-6 pt-10 pb-6 w-full flex flex-col sm:flex-row items-baseline justify-between gap-4">
        <div>
          <h1 class="font-sans font-black tracking-wider text-4xl sm:text-5xl uppercase text-white">
            Pokkhi
          </h1>
        </div>

        <!-- Offline Status Pill -->
        <div class="flex flex-wrap items-center gap-3">
          <div id="offline-pill" class="hidden items-center gap-1.5 text-red-400 text-[9px] font-mono uppercase tracking-wider bg-red-950/40 px-2.5 py-1 rounded-sm border border-red-900/40 animate-pulse">
            <i data-lucide="alert-circle" class="w-3 h-3"></i>
            <span>Offline Mode</span>
          </div>
        </div>
      </header>

      <!-- Main Container - Just the compact grid -->
      <main class="flex-grow w-full max-w-7xl mx-auto px-4 pb-16">
        
        <!-- Simple Toast-like Offline alert -->
        <div id="offline-alert" class="hidden mb-6 bg-red-950/60 border border-red-800/40 text-red-200 text-xs font-mono tracking-wider uppercase py-3 px-4 rounded-sm flex items-center justify-between gap-3">
          <div class="flex items-center gap-2">
            <i data-lucide="alert-circle" class="w-4 h-4 text-red-400 flex-shrink-0"></i>
            <span>Offline: Stream playback requires an active internet connection.</span>
          </div>
          <button 
            id="dismiss-offline"
            type="button" 
            class="text-[10px] hover:text-white underline tracking-widest uppercase ml-2 cursor-pointer"
          >
            Dismiss
          </button>
        </div>

        <!-- Simple Playback Error alert -->
        <div id="playback-error" class="hidden mb-6 bg-amber-950/60 border border-amber-800/40 text-amber-200 text-xs font-mono tracking-wider uppercase py-3 px-4 rounded-sm flex items-center justify-between gap-3">
          <div class="flex items-center gap-2">
            <i data-lucide="alert-circle" class="w-4 h-4 text-amber-400 flex-shrink-0"></i>
            <span id="error-message">Failed to play recording.</span>
          </div>
          <button 
            id="dismiss-error"
            type="button" 
            class="text-[10px] hover:text-white underline tracking-widest uppercase ml-2 cursor-pointer"
          >
            Dismiss
          </button>
        </div>

        <!-- Small, Dense Grid Layout (3-4 cells per row on md/lg screens) -->
        <div id="birds-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 w-full">
          <!-- Populated dynamically via JS -->
        </div>
      </main>

      <!-- Simple, clean Footer -->
      <footer class="bg-stone-950 border-t border-white/5 py-10 px-6 w-full text-stone-500 text-center">
        <div class="max-w-6xl mx-auto flex flex-col items-center gap-4">
          <p class="font-mono text-[9px] tracking-[0.2em] text-stone-600 uppercase">
            © Pokkhi Acoustic Record • Sreemangal Conservatory, Bangladesh
          </p>
        </div>
      </footer>
    </div>

    <!-- Main module script -->
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
