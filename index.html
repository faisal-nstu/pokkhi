<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokkhi</title>
    <!-- Add elegant inline SVG emoji favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐦</text></svg>">
    <!-- Import local CSS style sheet -->
    <link rel="stylesheet" href="./style.css" />
    <!-- Load Lucide icons from CDN for clean vanilla SVG handling -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div class="app-container">
      
      <!-- Top Accent Strip -->
      <div class="top-accent"></div>

      <!-- Header section with minimal title "Pokkhi" -->
      <header class="app-header">
        <div>
          <h1 class="app-title">Pokkhi</h1>
        </div>

        <!-- Offline Status Pill -->
        <div>
          <div id="offline-pill" class="status-pill danger hidden">
            <i data-lucide="alert-circle" style="width: 12px; height: 12px;"></i>
            <span>Offline Mode</span>
          </div>
        </div>
      </header>

      <!-- Main Container - Just the compact grid -->
      <main class="app-main">
        
        <!-- Simple Toast-like Offline alert -->
        <div id="offline-alert" class="alert-box danger hidden">
          <div class="alert-content">
            <i data-lucide="alert-circle" style="width: 16px; height: 16px; color: #fca5a5;"></i>
            <span>Offline: Stream playback requires an active internet connection.</span>
          </div>
          <button 
            id="dismiss-offline"
            type="button" 
            class="alert-dismiss-btn"
          >
            Dismiss
          </button>
        </div>

        <!-- Simple Playback Error alert -->
        <div id="playback-error" class="alert-box warning hidden">
          <div class="alert-content">
            <i data-lucide="alert-circle" style="width: 16px; height: 16px; color: #fcd34d;"></i>
            <span id="error-message">Failed to play recording.</span>
          </div>
          <button 
            id="dismiss-error"
            type="button" 
            class="alert-dismiss-btn"
          >
            Dismiss
          </button>
        </div>

        <!-- Small, Dense Grid Layout (3-4 cells per row on md/lg screens) -->
        <div id="birds-grid" class="birds-grid">
          <!-- Populated dynamically via JS -->
        </div>
      </main>

      <!-- Simple, clean Footer -->
      <footer class="app-footer">
        <div class="footer-inner">
          <p class="footer-text">© Pokkhi • Bangladeshi Bird Photo & Sound</p>
        </div>
      </footer>
    </div>

    <!-- Elegant Detail Modal Overlay -->
    <div id="details-modal" class="modal-overlay">
      <div class="modal-container">
        <!-- Close button -->
        <button id="modal-close" class="modal-close-btn" title="Close details">
          <i data-lucide="x" style="width: 16px; height: 16px;"></i>
        </button>

        <!-- Left Column: Hero Image -->
        <div class="modal-hero-side">
          <img id="modal-image" class="modal-img" src="" alt="" referrerpolicy="no-referrer" />
          <div class="modal-hero-overlay"></div>
        </div>

        <!-- Right Column: Details Info -->
        <div class="modal-content-side">
          <div class="modal-header-info">
            <span class="modal-scientific-name">Scientific Name: <span id="modal-scientific"></span></span>
            <h2 id="modal-title" class="modal-title"></h2>
          </div>

          <!-- Metadata Spec Grid -->
          <div class="modal-meta-grid">
            <div class="meta-item">
              <span class="meta-label">Family</span>
              <span id="modal-family" class="meta-value"></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Region</span>
              <span id="modal-region" class="meta-value"></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Habitat</span>
              <span id="modal-habitat" class="meta-value"></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Call Type</span>
              <span id="modal-calltype" class="meta-value"></span>
            </div>
          </div>

          <!-- Description -->
          <div id="modal-desc" class="modal-description"></div>

          <!-- Fun Fact Box -->
          <div class="modal-funfact">
            <div class="funfact-title">
              <i data-lucide="sparkles" style="width: 12px; height: 12px; stroke-width: 2.5;"></i>
              <span>Fun Fact</span>
            </div>
            <p id="modal-funfact-text" class="funfact-text"></p>
          </div>

          <!-- Play button inside Modal -->
          <button id="modal-play-trigger" class="modal-play-btn">
            <i data-lucide="play" style="width: 14px; height: 14px; fill: currentColor;"></i>
            <span id="modal-play-text">Listen to Call</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Main module script -->
    <script type="module" src="./app.js"></script>
  </body>
</html>
